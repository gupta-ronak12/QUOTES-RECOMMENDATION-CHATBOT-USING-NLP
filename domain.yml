version: "3.1"

intents:
  - greet
  - motivation
  - inspiration
  - love
  - success
  - funny
  - goodbye
  - iamabot

responses:
  utter_greet:
    - text: "Hello! 👋 Welcome! How can I help you today?"
    - text: "Hey there! 😊 Great to see you! What would you like today?"
    - text: "Hi! I'm here to brighten your day. What do you need?"

  utter_motivation:
    - text: "💪 Start where you are. Use what you have. Do what you can."
    - text: "🔥 Great things never come from comfort zones."
    - text: "⚡ Success begins with self-discipline."
    - text: "🚀 Believe in yourself and all that you are."
    - text: "💡 Little by little, day by day, what is meant for you will find its way."
    - text: "🎯 Discipline is doing what needs to be done even when you don't want to."
    - text: "🌟 Your future is created by what you do today, not tomorrow."
    - text: "💥 Small progress is still progress."
    - text: "🏁 Don't limit your challenges, challenge your limits."
    - text: "📈 The harder you work for something, the greater you'll feel when you achieve it."
    - text: "🌄 Every accomplishment starts with the decision to try."
    - text: "💪 Strength grows in the moments when you think you can't go on but you keep going anyway."
    - text: "🔥 Success doesn't come to you, you go to it."
    - text: "🚀 Your only competition is who you were yesterday."
    - text: "🎯 Stay focused and never give up."
    - text: "🌟 One day or day one. You decide."
    - text: "⚡ Make your dreams so big that they scare you."
    - text: "💡 Success is built on consistency."
    - text: "🏆 Hard work beats talent when talent doesn't work hard."
    - text: "🚀 If you can dream it, you can do it."

  utter_inspiration:
    - text: "✨ What lies behind us and what lies before us are tiny matters compared to what lies within us."
    - text: "🌟 Act as if what you do makes a difference. It does."
    - text: "💡 Turn your wounds into wisdom."
    - text: "🌈 Everything you have ever wanted is on the other side of fear."
    - text: "🌄 Difficult roads often lead to beautiful destinations."
    - text: "✨ Do what you can with what you have where you are."
    - text: "🌟 Your life becomes your message to the world. Make it inspiring."
    - text: "💫 Sometimes the smallest step in the right direction ends up being the biggest step of your life."
    - text: "🌈 Be the reason someone smiles today."
    - text: "💡 If opportunity does not knock, build a door."
    - text: "✨ The best way out is always through."
    - text: "🌟 You are stronger than you think."
    - text: "💫 Great things take time. Be patient."
    - text: "🌄 Storms make trees take deeper roots."
    - text: "✨ A river cuts through rock not because of its power but its persistence."
    - text: "🌟 Your potential is endless."
    - text: "💡 Let your dreams be bigger than your fears."
    - text: "🌈 Keep going. Everything you need will come to you."
    - text: "✨ The darkest nights produce the brightest stars."
    - text: "🌟 Be fearless in the pursuit of what sets your soul on fire."

  utter_love:
    - text: "❤️ Love recognizes no barriers."
    - text: "💕 Love is when the happiness of another person is essential to your own."
    - text: "💖 True love stories never have endings."
    - text: "❤️ To love and be loved is to feel the sun from both sides."
    - text: "💕 Where there is love, there is life."
    - text: "💖 Love is the bridge between you and everything."
    - text: "❤️ The best proof of love is trust."
    - text: "💕 Love is not about possession, it is about appreciation."
    - text: "💖 In a sea of people, my eyes will always search for you."
    - text: "❤️ Love is the greatest refreshment in life."
    - text: "💕 Love grows by giving."
    - text: "💖 The giving of love is an education in itself."
    - text: "❤️ Love is the beauty of the soul."
    - text: "💕 A loving heart is the truest wisdom."
    - text: "💖 Love does not make the world go round. Love is what makes the ride worthwhile."
    - text: "❤️ Love is friendship set on fire."
    - text: "💕 Love is the flower you have got to let grow."
    - text: "💖 Love is when two hearts beat as one."
    - text: "❤️ Love is the closest thing we have to magic."
    - text: "💕 To love deeply in one direction makes us more loving in all others."

  utter_success:
    - text: "🏆 Success is walking from failure to failure with no loss of enthusiasm."
    - text: "🎯 The secret of success is to do the common thing uncommonly well."
    - text: "🌠 Success is where preparation and opportunity meet."
    - text: "🚀 Success does not just find you. You have to go out and get it."
    - text: "🏆 Success is the sum of small efforts repeated daily."
    - text: "🎯 Success is not in what you have, but who you are."
    - text: "🌠 Success is the result of preparation, hard work, and learning from failure."
    - text: "🚀 Success comes from knowing that you did your best."
    - text: "🏆 Action is the foundational key to all success."
    - text: "🎯 Don't be afraid to give up the good to go for the great."
    - text: "🌠 Success depends upon previous preparation."
    - text: "🚀 Success is liking yourself, liking what you do, and liking how you do it."
    - text: "🏆 Success is achieved and maintained by those who try and keep trying."
    - text: "🎯 Success grows from perseverance."
    - text: "🌠 The formula for success is simple: practice and concentration."
    - text: "🚀 Success is earned, not given."
    - text: "🏆 Success is built on courage and consistency."
    - text: "🎯 Success is the progressive realization of a worthy goal."
    - text: "🌠 Success is not about luck, it's about effort."
    - text: "🚀 Success belongs to those who dare to try."

  utter_funny:
    - text: "😄 I'm not lazy, I am on energy-saving mode."
    - text: "😂 I used to think I was indecisive, but now I am not too sure."
    - text: "🤣 My bed and I are perfect for each other, but my alarm clock keeps trying to break us up."
    - text: "😆 I am not arguing, I am just explaining why I am right."
    - text: "😂 Life is short. Smile while you still have teeth."
    - text: "🤣 I'm reading a book about anti-gravity. It is impossible to put down."
    - text: "😄 I told my computer I needed a break, and it said 'No problem, I will go to sleep.'"
    - text: "😂 Some people graduate with honors, I am just honored to graduate."
    - text: "🤣 If we should not eat at night, why is there a light in the fridge?"
    - text: "😆 I am on a whiskey diet. I've lost three days already."
    - text: "😂 I put my phone in airplane mode, but it is not flying yet."
    - text: "🤣 Why did the scarecrow win an award? Because he was outstanding in his field."
    - text: "😄 I'm not great at advice. Can I interest you in a sarcastic comment?"
    - text: "😂 I used to play piano by ear, now I use my hands."
    - text: "🤣 Why do not skeletons fight each other? They do not have the guts."
    - text: "😆 I am multitasking: I can listen, ignore and forget all at once."
    - text: "😂 My wallet is like an onion, opening it makes me cry."
    - text: "🤣 I told my dog to fetch a stick, he brought me my homework."
    - text: "😄 I'm not superstitious, but I am a little stitious."
    - text: "😂 Why did the computer go to therapy? It had too many bytes of emotional baggage."

  utter_goodbye:
    - text: "👋 Goodbye! Have a wonderful day ahead!"
    - text: "See you later! Stay motivated and keep shining!"

  utter_iamabot:
    - text: "Yes, I am a bot created using Rasa."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true