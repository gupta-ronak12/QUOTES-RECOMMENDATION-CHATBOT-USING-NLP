version: "3.1"

intents:
  - greet
  - motivation
  - inspiration
  - love
  - success
  - funny
  - goodbye

responses:
  utter_greet:
    - text: "Hello! 👋 Welcome! How can I help you today?"
    - text: "Hey there! 😊 Great to see you! What would you like today?"
    - text: "Hi! I'm here to brighten your day. What do you need?"

  utter_motivation:
    - text: "💪 'The secret of getting ahead is getting started.' – Mark Twain"
    - text: "🔥 'Push yourself, because no one else is going to do it for you.'"
    - text: "⚡ 'Dream it. Wish it. Do it. Your only limit is your mind!'"
    - text: "🚀 'Don't stop when you're tired. Stop when you're done!'"
    - text: "💥 'Hard days are the best because that's when champions are made.'"

  utter_inspiration:
    - text: "✨ 'In the middle of every difficulty lies opportunity.' – Albert Einstein"
    - text: "🌟 'It always seems impossible until it's done.' – Nelson Mandela"
    - text: "💡 'Believe you can and you're halfway there.' – Theodore Roosevelt"
    - text: "🌈 'The best time to plant a tree was 20 years ago. The second best time is now.'"
    - text: "🦋 'You are braver than you believe, stronger than you seem, and smarter than you think.'"

  utter_love:
    - text: "❤️ 'The best thing to hold onto in life is each other.' – Audrey Hepburn"
    - text: "💕 'You know you're in love when you can't fall asleep because reality is finally better than your dreams.' – Dr. Seuss"
    - text: "💖 'I love you not only for what you are, but for what I am when I am with you.'"
    - text: "🌹 'To love and be loved is to feel the sun from both sides.' – David Viscott"
    - text: "💗 'Love is composed of a single soul inhabiting two bodies.' – Aristotle"

  utter_success:
    - text: "🏆 'Success is not final, failure is not fatal: It is the courage to continue that counts.' – Winston Churchill"
    - text: "🎯 'The road to success and the road to failure are almost exactly the same.'"
    - text: "🌠 'Success usually comes to those who are too busy to be looking for it.' – Henry David Thoreau"
    - text: "💼 'Don't be afraid to give up the good to go for the great.' – John D. Rockefeller"
    - text: "🥇 'Success is walking from failure to failure with no loss of enthusiasm.' – Winston Churchill"

  utter_funny:
    - text: "😄 'I am on a seafood diet. I see food and I eat it!'"
    - text: "😂 'Why don't scientists trust atoms? Because they make up everything!'"
    - text: "🤣 'I told my wife she was drawing her eyebrows too high. She looked surprised!'"
    - text: "😆 'Behind every great man is a woman rolling her eyes.' – Jim Carrey"
    - text: "😹 'Common sense is like deodorant. The people who need it most never use it!'"

  utter_goodbye:
    - text: "👋 Goodbye! Have a wonderful day ahead! 🌟"
    - text: "See you later! Stay motivated and keep shining! ✨"
    - text: "Bye bye! Come back anytime you need a boost! 💪"
    - text: "Take care! Wishing you an amazing day! 😊"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
