# This file contains tests to evaluate that bot behaves as expected.
# tests/test_stories.yml
stories:

  - story: greet and motivation
    steps:
      - user: |
          hi
        intent: greet
      - action: utter_greet
      - user: |
          i need motivation
        intent: motivation
      - action: utter_motivation

  - story: greet and funny
    steps:
      - user: |
          hello
        intent: greet
      - action: utter_greet
      - user: |
          tell me something funny
        intent: funny
      - action: utter_funny

  - story: success quote request
    steps:
      - user: |
          give me a success quote
        intent: success
      - action: utter_success

  - story: success motivation flow
    steps:
      - user: |
          how can i reach my goals
        intent: success
      - action: utter_success
