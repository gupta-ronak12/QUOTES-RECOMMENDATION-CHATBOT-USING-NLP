version: "3.1"

rules:

- rule: Greet user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Give motivation
  steps:
    - intent: motivation
    - action: utter_motivation

- rule: Give inspiration
  steps:
    - intent: inspiration
    - action: utter_inspiration

- rule: Give love quotes
  steps:
